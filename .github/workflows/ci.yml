name: CI / Release

# Single pipeline modelled on the attached CI/Release workflow, adapted to this repo:
#   * CI gates (lint/typecheck/test, compose config, Soroban contract) run on every PR and push.
#   * Release (build + push images to GHCR) runs only once code has landed on main / a tag.
#   * Deploy pushes the freshly built images to the VPS on a push to main.
#
# PRs never build/push/deploy: fork PRs don't get repo secrets, and deploying unmerged code is
# unsafe. The release + deploy jobs are therefore gated on `github.event_name == 'push'`.
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    tags: ['v*']
  workflow_dispatch:

concurrency:
  group: ci-release-${{ github.ref }}
  # Cancel superseded runs on PRs (fast feedback), but never cancel a release/deploy on main.
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  REGISTRY: ghcr.io

jobs:
  # ---------------------------------------------------------------------------
  # CI — lint · typecheck · test (workspaces)
  # ---------------------------------------------------------------------------
  build:
    name: Lint · Typecheck · Test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Cross-package consumers resolve workspace deps via their built `dist` (package.json
      # `main`/`types` point there). `@payorder/shared` is consumed by every package, and
      # `@payorder/api` is consumed by `@payorder/worker`, so both must be built before the
      # typecheck/test steps can resolve them.
      - name: Build shared packages
        run: |
          npm run build --workspace @payorder/shared
          npm run build --workspace @payorder/api

      - name: Format check
        run: npm run format:check

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Test
        run: npm test

  # ---------------------------------------------------------------------------
  # CI — Docker Compose config validation
  # ---------------------------------------------------------------------------
  compose:
    name: Docker Compose · config validation
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # The compose files must parse with the committed example envs so a broken local/VPS
      # stack is caught on PRs, not at deploy time. `config -q` interpolates + validates only;
      # it neither builds images nor contacts the daemon for resources.
      - name: Validate local compose
        run: |
          cp infra/docker/.env.local.example infra/docker/.env.local
          docker compose --env-file infra/docker/.env.local \
            -f infra/docker/docker-compose.local.yml config -q
          echo "local compose OK"

      - name: Validate VPS compose
        run: |
          # Services declare `env_file: [.env.vps]`; `config` requires that file to exist on
          # disk (separate from the `--env-file` interpolation source), so materialize it.
          cp infra/docker/.env.payorder.vps.example infra/docker/.env.vps
          docker compose -p payorder -f infra/docker/docker-compose.payorder.vps.yml \
            --env-file infra/docker/.env.vps config -q
          echo "vps compose OK"

  # ---------------------------------------------------------------------------
  # CI — Soroban contract · fmt · clippy · test
  # ---------------------------------------------------------------------------
  contract:
    name: Soroban contract · fmt · clippy · test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: contracts/payorder
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32v1-none

      - name: Cache cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            contracts/payorder/target
          key: cargo-${{ runner.os }}-${{ hashFiles('contracts/payorder/Cargo.lock') }}

      - name: Format check
        run: cargo fmt --check

      - name: Clippy
        run: cargo clippy --all-targets -- -D warnings

      - name: Test
        run: cargo test

      - name: Build WASM
        run: cargo build --target wasm32v1-none --release

  # ---------------------------------------------------------------------------
  # Release — build & push images to GHCR (only after every CI gate passes)
  # ---------------------------------------------------------------------------
  build-and-push:
    name: Build & push ${{ matrix.image }}
    needs: [build, compose, contract]
    # Only on a real push to main or a version tag — never on PRs.
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image: payorder-api
            dockerfile: infra/docker/api.Dockerfile
            build_args: ''
          # The web bundle bakes NEXT_PUBLIC_* URLs at BUILD time, so they come from repo vars.
          - image: payorder-web
            dockerfile: infra/docker/web.Dockerfile
            build_args: |
              NEXT_PUBLIC_API_BASE_URL=${{ vars.NEXT_PUBLIC_API_BASE_URL }}
              NEXT_PUBLIC_HORIZON_URL=${{ vars.NEXT_PUBLIC_HORIZON_URL }}
              NEXT_PUBLIC_SOROBAN_RPC_URL=${{ vars.NEXT_PUBLIC_SOROBAN_RPC_URL }}
              NEXT_PUBLIC_EXPLORER_BASE_URL=${{ vars.NEXT_PUBLIC_EXPLORER_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # GHCR image paths must be lowercase; the owner can contain capitals.
      - name: Lowercase owner
        id: owner
        run: echo "value=${GITHUB_REPOSITORY_OWNER,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image metadata (tags + labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.owner.outputs.value }}/${{ matrix.image }}
          tags: |
            type=sha,prefix=sha-,format=short
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build & push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: ${{ matrix.build_args }}
          cache-from: type=gha,scope=${{ matrix.image }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image }}

  # ---------------------------------------------------------------------------
  # Deploy — push the freshly built "latest" images to the VPS on a push to main
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to VPS
    needs: build-and-push
    # Only on the default branch, and only when the repo has opted in (set repo variable
    # DEPLOY_ENABLED=true and configure the VPS_* / app secrets below). Keeps the pipeline green
    # for forks / unconfigured repos.
    if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && vars.DEPLOY_ENABLED == 'true' }}
    runs-on: ubuntu-latest
    environment: vps # add required reviewers here for a manual approval gate
    steps:
      - name: Compute image tag
        id: tag
        run: echo "image_tag=sha-$(echo "${GITHUB_SHA}" | cut -c1-7)" >> "$GITHUB_OUTPUT"

      - name: Deploy over SSH (render .env.vps → pull → migrate → up → smoke)
        uses: appleboy/ssh-action@v1
        env:
          # Image tag CI just built + pushed.
          IMAGE_TAG: ${{ steps.tag.outputs.image_tag }}

          # --- Non-secret config (repo Variables; shell defaults below cover unset ones) ---
          REGISTRY: ${{ vars.REGISTRY }}
          WEB_DOMAIN: ${{ vars.WEB_DOMAIN }}
          API_DOMAIN: ${{ vars.API_DOMAIN }}
          TRAEFIK_NETWORK: ${{ vars.TRAEFIK_NETWORK }}
          CERT_RESOLVER: ${{ vars.CERT_RESOLVER }}
          # Public on-chain (Testnet) contract address — not a secret, but env-specific.
          SOROBAN_CONTRACT_ID: ${{ vars.SOROBAN_CONTRACT_ID }}

          # --- Secrets (repo Secrets; never printed, never committed) ---
          POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          WEBHOOK_SIGNING_SECRET: ${{ secrets.WEBHOOK_SIGNING_SECRET }}
          SOROBAN_ADMIN_SECRET: ${{ secrets.SOROBAN_ADMIN_SECRET }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          # appleboy/ssh-action only forwards the env vars named here into the remote shell.
          envs: IMAGE_TAG,REGISTRY,WEB_DOMAIN,API_DOMAIN,TRAEFIK_NETWORK,CERT_RESOLVER,SOROBAN_CONTRACT_ID,POSTGRES_PASSWORD,JWT_SECRET,WEBHOOK_SIGNING_SECRET,SOROBAN_ADMIN_SECRET
          script_stop: true
          script: |
            set -euo pipefail
            cd "${{ secrets.VPS_PATH }}"
            git fetch --all --prune
            git checkout "${{ github.sha }}"

            # --- Fail fast if a required secret was not configured in GitHub ---
            : "${POSTGRES_PASSWORD:?set the POSTGRES_PASSWORD repo secret}"
            : "${JWT_SECRET:?set the JWT_SECRET repo secret}"
            : "${WEBHOOK_SIGNING_SECRET:?set the WEBHOOK_SIGNING_SECRET repo secret}"
            : "${SOROBAN_ADMIN_SECRET:?set the SOROBAN_ADMIN_SECRET repo secret}"
            : "${SOROBAN_CONTRACT_ID:?set the SOROBAN_CONTRACT_ID repo variable}"

            # --- Non-secret config: repo Variables override these production defaults ---
            REGISTRY="${REGISTRY:-ghcr.io/guardianlabsw3-lang}"
            WEB_DOMAIN="${WEB_DOMAIN:-pow3.guardian-labs.xyz}"
            API_DOMAIN="${API_DOMAIN:-pow3-api.guardian-labs.xyz}"
            TRAEFIK_NETWORK="${TRAEFIK_NETWORK:-proxy}"
            CERT_RESOLVER="${CERT_RESOLVER:-le}"
            POSTGRES_USER=payorder
            POSTGRES_DB=payorder

            # --- Render infra/docker/.env.vps (env_file + Compose interpolation source) ---
            # umask so the file is created 0600; regenerated on every deploy from GitHub state,
            # and wiped on exit (trap below) so secrets never linger on the VPS disk.
            echo "==> Rendering infra/docker/.env.vps (IMAGE_TAG=${IMAGE_TAG})"
            umask 077
            cat > infra/docker/.env.vps <<EOF
            # Generated by CI (.github/workflows/ci.yml) — do NOT edit by hand; changes are
            # overwritten on the next deploy. Sourced from GitHub Secrets + Variables.
            REGISTRY=${REGISTRY}
            IMAGE_TAG=${IMAGE_TAG}

            TRAEFIK_NETWORK=${TRAEFIK_NETWORK}
            CERT_RESOLVER=${CERT_RESOLVER}
            WEB_DOMAIN=${WEB_DOMAIN}
            API_DOMAIN=${API_DOMAIN}

            POSTGRES_USER=${POSTGRES_USER}
            POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
            POSTGRES_DB=${POSTGRES_DB}

            NODE_ENV=production
            API_PORT=3000
            LOG_LEVEL=info
            DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@payorder_postgres:5432/${POSTGRES_DB}
            REDIS_URL=redis://payorder_redis:6379

            APP_BASE_URL=https://${API_DOMAIN}
            PUBLIC_WEB_URL=https://${WEB_DOMAIN}
            JWT_SECRET=${JWT_SECRET}
            WEBHOOK_SIGNING_SECRET=${WEBHOOK_SIGNING_SECRET}
            CORS_ORIGINS=https://${WEB_DOMAIN}

            STELLAR_NETWORK=TESTNET
            STELLAR_NETWORK_PASSPHRASE=Test SDF Network ; September 2015
            STELLAR_HORIZON_URL=https://horizon-testnet.stellar.org
            STELLAR_SOROBAN_RPC_URL=https://soroban-testnet.stellar.org
            STELLAR_FRIENDBOT_URL=https://friendbot.stellar.org
            SOROBAN_CONTRACT_ID=${SOROBAN_CONTRACT_ID}
            SOROBAN_ADMIN_SECRET=${SOROBAN_ADMIN_SECRET}
            REGISTER_ON_CHAIN_SYNC=false

            NEXT_PUBLIC_API_BASE_URL=https://${API_DOMAIN}
            NEXT_PUBLIC_HORIZON_URL=https://horizon-testnet.stellar.org
            NEXT_PUBLIC_SOROBAN_RPC_URL=https://soroban-testnet.stellar.org
            NEXT_PUBLIC_EXPLORER_BASE_URL=https://stellar.expert/explorer/testnet
            API_INTERNAL_BASE_URL=http://payorder_api:3000
            EOF
            chmod 600 infra/docker/.env.vps
            # Wipe the rendered secrets on ANY exit (success or failure); the running containers
            # keep their env from `compose up`, and the next deploy re-renders the file.
            trap 'rm -f infra/docker/.env.vps' EXIT

            # deploy.sh pulls the images tagged with this commit's short SHA, migrates, then
            # brings the payorder stack up (see the script header for details).
            IMAGE_TAG="${IMAGE_TAG}" \
              COMPOSE_FILE="infra/docker/docker-compose.payorder.vps.yml" \
              infra/scripts/deploy.sh
