# PayOrder W3 Guardian — local development stack (TASK-027 / spec 12).
#
# Bring everything up with one command (`make up`): Postgres, Redis, a one-shot migrate job,
# the API, the worker and the web frontend. Stellar/Soroban is the **public Testnet** (Horizon
# / Soroban RPC / Friendbot via env), never a local container.
#
#   docker compose --env-file infra/docker/.env.local -f infra/docker/docker-compose.local.yml up -d --build
#
# Copy `.env.local.example` → `.env.local` first (see the Makefile `make up`).
name: payorder-local

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes: ['payorder_pg:/var/lib/postgresql/data']
    ports: ['5432:5432']
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}']
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [payorder]

  redis:
    image: redis:7-alpine
    command: ['redis-server', '--appendonly', 'yes']
    volumes: ['payorder_redis:/data']
    ports: ['6379:6379']
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10
    networks: [payorder]

  # One-shot: apply migrations then exit. The api waits for it to complete successfully.
  migrate:
    build:
      context: ../../
      dockerfile: infra/docker/api.Dockerfile
    image: payorder-api:local
    command: ['node', 'apps/api/dist/infrastructure/persistence/migrate.js']
    env_file: ['.env.local']
    depends_on:
      postgres: { condition: service_healthy }
    restart: 'no'
    networks: [payorder]

  # One-shot: seed the admin user (+ a demo tenant with a wallet) so the panel login works on
  # a fresh stack — without this, the first `POST /api/auth/login` returns UNAUTHENTICATED
  # because `admin_users` is empty. Runs after migrations and is idempotent (safe to re-run on
  # every `make up`). Local only: the VPS stack never auto-creates a default admin.
  seed:
    image: payorder-api:local
    command: ['node', 'apps/api/dist/infrastructure/persistence/seed.js']
    env_file: ['.env.local']
    depends_on:
      postgres: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    restart: 'no'
    networks: [payorder]

  api:
    build:
      context: ../../
      dockerfile: infra/docker/api.Dockerfile
    image: payorder-api:local
    env_file: ['.env.local']
    ports: ['3000:3000']
    depends_on:
      postgres: { condition: service_healthy }
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
      seed: { condition: service_completed_successfully }
    healthcheck:
      test: ['CMD', 'wget', '-qO-', 'http://localhost:3000/health']
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    networks: [payorder]

  worker:
    image: payorder-api:local
    command: ['node', 'apps/worker/dist/index.js']
    env_file: ['.env.local']
    depends_on:
      api: { condition: service_started }
      redis: { condition: service_healthy }
      migrate: { condition: service_completed_successfully }
    restart: unless-stopped
    networks: [payorder]

  web:
    build:
      context: ../../
      dockerfile: infra/docker/web.Dockerfile
      args:
        NEXT_PUBLIC_API_BASE_URL: ${NEXT_PUBLIC_API_BASE_URL:-http://localhost:3000}
        NEXT_PUBLIC_HORIZON_URL: ${NEXT_PUBLIC_HORIZON_URL:-https://horizon-testnet.stellar.org}
        NEXT_PUBLIC_SOROBAN_RPC_URL: ${NEXT_PUBLIC_SOROBAN_RPC_URL:-https://soroban-testnet.stellar.org}
        NEXT_PUBLIC_EXPLORER_BASE_URL: ${NEXT_PUBLIC_EXPLORER_BASE_URL:-https://stellar.expert/explorer/testnet}
    image: payorder-web:local
    # Runtime (non-baked) env: SSR must reach the API by service name, since inside this container
    # `localhost:3000` is the web container itself, not the API.
    environment:
      API_INTERNAL_BASE_URL: ${API_INTERNAL_BASE_URL:-http://api:3000}
    ports: ['3001:3000']
    depends_on:
      api: { condition: service_started }
    networks: [payorder]

volumes:
  payorder_pg:
  payorder_redis:

networks:
  payorder:
    driver: bridge
